name: Build Release Binaries

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin_name: nulltris-linux
            artifact: nulltris-linux
          - os: windows-latest
            bin_name: nulltris-windows
            artifact: nulltris-windows.exe
          - os: macos-13
            bin_name: nulltris-macos-x86_64
            artifact: nulltris-macos-x86_64
          - os: macos-latest
            bin_name: nulltris-macos-arm64
            artifact: nulltris-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build binary
        run: uv run --with pyinstaller pyinstaller --onefile --name ${{ matrix.bin_name }} main.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/${{ matrix.artifact }}
